name: oxicloud
description: "OxiCloud cross-platform client — self-hosted cloud storage"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: 3.2.1
  riverpod_annotation: 4.0.2

  # Navigation
  go_router: 17.1.0

  # Networking
  dio: 5.9.2
  connectivity_plus: 7.0.0

  # Local database (offline-first)
  drift: 2.30.0
  sqlite3_flutter_libs: 0.5.41

  # Secure storage
  flutter_secure_storage: 10.0.0

  # Code generation (freezed + json)
  freezed_annotation: 3.1.0
  json_annotation: 4.11.0

  # Utilities
  path_provider: 2.1.5
  path: 1.9.1
  intl: 0.20.2
  uuid: 4.5.2
  mime: 2.0.0
  collection: 1.19.1
  crypto: 3.0.7
  equatable: 2.0.7
  logger: 2.6.2

  # File operations
  file_picker: 11.0.2
  share_plus: 10.1.4
  open_filex: 4.7.0
  url_launcher: 6.3.2

  # UI
  cupertino_icons: 1.0.8
  cached_network_image: 3.4.1
  flutter_svg: 2.2.4
  shimmer: 3.0.0
  photo_view: 0.15.0

  # Desktop-specific
  desktop_drop: 0.6.1
  window_manager: 0.5.1

  # Notifications
  flutter_local_notifications: 21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

  # Code generation
  build_runner: 2.13.1
  riverpod_generator: 4.0.3
  freezed: 3.2.5
  json_serializable: 6.13.0
  drift_dev: 2.31.0

  # Testing
  mocktail: 1.0.4
  fake_async: 1.3.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/l10n/
