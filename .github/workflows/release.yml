name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.38.0"

jobs:
  # ───────────────────────── Android ─────────────────────────
  release-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  # ───────────────────────── iOS ─────────────────────────────
  release-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r OxiCloud-ios-${{ github.ref_name }}.zip Payload

      - uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: OxiCloud-ios-${{ github.ref_name }}.zip

  # ───────────────────────── macOS ───────────────────────────
  release-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/OxiCloud-macos-${{ github.ref_name }}.zip" oxicloud.app

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: OxiCloud-macos-${{ github.ref_name }}.zip

  # ───────────────────────── Linux ───────────────────────────
  release-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/OxiCloud-linux-x64-${{ github.ref_name }}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: OxiCloud-linux-x64-${{ github.ref_name }}.tar.gz

  # ───────────────────────── Windows ─────────────────────────
  release-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "OxiCloud-windows-x64-${{ github.ref_name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: OxiCloud-windows-x64-${{ github.ref_name }}.zip

  # ───────────────────── GitHub Release ──────────────────────
  publish:
    name: Publish GitHub Release
    needs: [release-android, release-ios, release-macos, release-linux, release-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            artifacts/**/*.aab
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
