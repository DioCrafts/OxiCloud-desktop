name: Build All Platforms

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.7"

jobs:
  # ───────────────────────── Android ─────────────────────────
  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK (fat)
        run: flutter build apk --release

      - name: Build APK (per-ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 14

  # ───────────────────────── iOS ─────────────────────────────
  build-ios:
    name: iOS (no-codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create Payload zip
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r OxiCloud-ios.zip Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: OxiCloud-ios.zip
          retention-days: 14

  # ───────────────────────── macOS ───────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG-ready zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/OxiCloud-macos.zip" oxicloud.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: OxiCloud-macos.zip
          retention-days: 14

  # ───────────────────────── Linux ───────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/OxiCloud-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: OxiCloud-linux-x64.tar.gz
          retention-days: 14

  # ───────────────────────── Windows ─────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "OxiCloud-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: OxiCloud-windows-x64.zip
          retention-days: 14
